services:
  app:
    build:
      context: .
    ports:
      - "8787:8787"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_URL: postgres://${APP_DB_USER:?Set APP_DB_USER in .env}:${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env}@postgres:5432/resume_analyzer
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-5.5}
      LLM_API_STYLE: ${LLM_API_STYLE:-responses}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      ADMIN_NAME: ${ADMIN_NAME:-Resume Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-not-needed}
      EMBEDDING_BASE_URL: http://host.docker.internal:1234/v1
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5-embedding}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        aliases:
          - resume-analyzer-web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    command: ["postgres", "-c", "password_encryption=scram-sha-256"]
    environment:
      POSTGRES_DB: resume_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      APP_DB_USER: ${APP_DB_USER:?Set APP_DB_USER in .env}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resume_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /app
    environment:
      E2E_BASE_URL: http://resume-analyzer-web:8787
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
    volumes:
      - .:/app
      - playwright_node_modules:/app/node_modules
    depends_on:
      app:
        condition: service_started
    command: ["bash", "-lc", "corepack enable && corepack prepare pnpm@11.6.0 --activate && pnpm install --frozen-lockfile && pnpm e2e"]
    profiles:
      - test

  unit-tests:
    image: node:25-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
      - unit_node_modules:/app/node_modules
    entrypoint: ["bash", "-lc", "npm install -g pnpm@11.6.0 && pnpm install --frozen-lockfile && exec \"$@\"", "--"]
    command: ["pnpm", "coverage"]
    profiles:
      - test

volumes:
  postgres_data:
  playwright_node_modules:
  unit_node_modules:
