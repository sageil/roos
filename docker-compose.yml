name: roos

x-app-environment: &app-environment
  HOST: 0.0.0.0
  PORT: 8787
  DATABASE_URL: postgres://${APP_DB_USER:?Set APP_DB_USER in .env}:${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env}@postgres:5432/roos
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  LLM_MODEL: ${LLM_MODEL:-gpt-5.5}
  LLM_API_STYLE: ${LLM_API_STYLE:-responses}
  SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
  ADMIN_NAME: ${ADMIN_NAME:-Roos Admin}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  EMAIL_FROM: ${EMAIL_FROM:-}
  EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Roos Admin}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-not-needed}
  EMBEDDING_BASE_URL: http://host.docker.internal:1234/v1
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5-embedding}
  EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
  APP_INSTANCE_URLS: ${APP_INSTANCE_URLS:-app-1=http://app-1:8787/api/instance-health,app-2=http://app-2:8787/api/instance-health}

x-app-common: &app-common
  build:
    context: .
  image: roos-app
  expose:
    - "8787"
  environment: *app-environment
  depends_on:
    postgres:
      condition: service_healthy
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test:
      - CMD-SHELL
      - >-
        node -e "fetch('http://127.0.0.1:8787/api/health').then(async (response) => {
        const body = await response.json();
        if (!response.ok || !body.storage?.postgres?.ok) process.exit(1);
        }).catch(() => process.exit(1))"
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 10s
  restart: unless-stopped

services:
  cert-init:
    image: smallstep/step-cli:0.30.2
    volumes:
      - ./data/tls:/certs
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -f /certs/root_ca.crt ] || [ ! -f /certs/root_ca.key ]; then
          step certificate create "Roos Local Root CA" /certs/root_ca.crt /certs/root_ca.key \
            --profile root-ca \
            --not-after 87600h \
            --no-password \
            --insecure \
            --force
        fi

        step certificate create localhost /certs/server.crt /certs/server.key \
          --profile leaf \
          --ca /certs/root_ca.crt \
          --ca-key /certs/root_ca.key \
          --san localhost \
          --san 127.0.0.1 \
          --san roos-web \
          --san nginx \
          --not-after 2160h \
          --no-password \
          --insecure \
          --force

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8787:443"
    volumes:
      - ./data/tls:/etc/nginx/tls:ro
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        map $$http_upgrade $$connection_upgrade {
          default upgrade;
          "" close;
        }

        upstream roos_app {
          least_conn;
          server app-1:8787 max_fails=3 fail_timeout=10s;
          server app-2:8787 max_fails=3 fail_timeout=10s;
          keepalive 32;
        }

        server {
          listen 443 ssl;
          server_name _;

          client_max_body_size 8m;
          ssl_certificate /etc/nginx/tls/server.crt;
          ssl_certificate_key /etc/nginx/tls/server.key;
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_prefer_server_ciphers off;

          location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
          }

          location / {
            proxy_pass http://roos_app;
            proxy_http_version 1.1;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection $$connection_upgrade;
          }
        }
        EOF
        nginx -g 'daemon off;'
    depends_on:
      cert-init:
        condition: service_completed_successfully
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
    networks:
      default:
        aliases:
          - roos-web
    restart: unless-stopped

  app-1:
    <<: *app-common
    environment:
      <<: *app-environment
      APP_INSTANCE_NAME: app-1

  app-2:
    <<: *app-common
    environment:
      <<: *app-environment
      APP_INSTANCE_NAME: app-2

  postgres:
    image: pgvector/pgvector:pg17
    command: ["postgres", "-c", "password_encryption=scram-sha-256"]
    environment:
      POSTGRES_DB: roos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      APP_DB_USER: ${APP_DB_USER:?Set APP_DB_USER in .env}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roos"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /app
    environment:
      E2E_BASE_URL: https://roos-web
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      DATABASE_URL: postgres://${APP_DB_USER:?Set APP_DB_USER in .env}:${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env}@postgres:5432/roos
    volumes:
      - .:/app
      - playwright_node_modules:/app/node_modules
    depends_on:
      nginx:
        condition: service_started
    command: ["bash", "-lc", "corepack enable && corepack prepare pnpm@11.6.0 --activate && pnpm install --frozen-lockfile && pnpm e2e"]
    profiles:
      - test

  unit-tests:
    image: node:25-bookworm-slim
    working_dir: /app
    environment:
      DATABASE_URL: postgres://${APP_DB_USER:?Set APP_DB_USER in .env}:${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env}@postgres:5432/roos
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      LLM_MODEL: ${LLM_MODEL:-gpt-5.5}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5-embedding}
    volumes:
      - .:/app
      - unit_node_modules:/app/node_modules
    entrypoint: ["bash", "-lc", "npm install -g pnpm@11.6.0 && pnpm install --frozen-lockfile && exec \"$@\"", "--"]
    command: ["pnpm", "coverage"]
    profiles:
      - test

volumes:
  postgres_data:
  playwright_node_modules:
  unit_node_modules:
